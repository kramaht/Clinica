{% extends 'layouts/base.html' %}
{% block title %}Nuevo Médico{% endblock %}
{% block page_title %}<i class="bi bi-person-plus me-2"></i>Nuevo Médico{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-xl-8">
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Usuario (cuenta del médico) *</label>
          <select name="usuario_id" class="form-select" required>
            <option value="">Seleccionar usuario…</option>
            {% for u in usuarios_disponibles %}
            <option value="{{ u.id }}">{{ u.nombre_completo }} — {{ u.email }}</option>
            {% endfor %}
          </select>
          <div class="form-text">Solo usuarios con rol "médico" sin perfil asignado.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Especialidad *</label>
          <select name="especialidad_id" class="form-select" required>
            <option value="">Seleccionar…</option>
            {% for e in especialidades %}
            <option value="{{ e.id }}">{{ e.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Nº Matrícula *</label>
          <input type="text" name="matricula" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Consultorio</label>
          <input type="text" name="consultorio" class="form-control" placeholder="Ej. Consultorio 3">
        </div>
        <div class="col-md-4">
          <label class="form-label">Teléfono</label>
          <input type="text" name="telefono" class="form-control">
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-clinic-primary px-4">
          <i class="bi bi-floppy me-1"></i>Registrar médico
        </button>
        <a href="{{ url_for('medicos.index') }}" class="btn btn-light">Cancelar</a>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión · ClinicaMed</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root { --clinic-dark: #0f2a4a; --clinic-blue: #1a6fb5; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--clinic-dark) 0%, #1a4a7a 60%, #0d9488 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .login-logo { font-size: 2.5rem; color: var(--clinic-blue); }
    .login-title { font-size: 1.5rem; font-weight: 700; color: var(--clinic-dark); }
    .form-control {
      border-radius: 8px; border: 1.5px solid #d6e0ee;
      padding: .65rem 1rem; font-size: .92rem;
    }
    .form-control:focus { border-color: var(--clinic-blue); box-shadow: 0 0 0 3px rgba(26,111,181,.15); }
    .btn-login {
      background: var(--clinic-blue); color: #fff; border: none;
      border-radius: 8px; padding: .7rem; font-weight: 600; font-size: .95rem;
      width: 100%; transition: background .2s;
    }
    .btn-login:hover { background: #155fa0; }
    .input-group-text { border-radius: 8px 0 0 8px; background: #f0f7ff; border: 1.5px solid #d6e0ee; border-right: 0; }
    .input-group .form-control { border-radius: 0 8px 8px 0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo"><i class="bi bi-hospital-fill"></i></div>
      <div class="login-title mt-2">ClinicaMed</div>
      <p class="text-muted small">Sistema de Gestión de Clínica Médica</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2 small">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control" placeholder="correo@clinica.com" required autofocus/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
      </div>
      <div class="mb-4 d-flex align-items-center">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember"/>
          <label class="form-check-label small" for="remember">Recordarme</label>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      TEM-742 · Tecnologías Emergentes II
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
